syntax = "proto3";

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "org.leochel";

package vk_internship;

service KeyValueAccessService {
  rpc Put(KeyValuePair) returns (google.protobuf.Empty);

  rpc Count(google.protobuf.Empty) returns (CountResponse);

  rpc Delete(Key) returns (google.protobuf.Empty);

  rpc Get(Key) returns (KeyValuePair);

  rpc Range(KeyRange) returns (stream KeyValuePair);
}

message KeyValuePair {
  string key = 1;
  optional bytes value = 2;
}

message Key {
  string key = 1;
}

message KeyRange {
  string key_since = 1;
  string key_to = 2;
}

message CountResponse {
  int64 row_count = 1;
}
